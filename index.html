<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Films Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Movie Database</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search film...">
            
            <button id="yearBtn" onclick="toggleSort('release_year')">Year ↕</button>
            <button id="boxBtn" onclick="toggleSort('box_office')">Revenue ↕</button>
            <button class="reset-btn" onclick="resetSort()">Reset ✖</button>
        </div>
    </header>

    <main id="filmContainer">
        </main>

    <script src="script.js"></script>
</body>
</html>
